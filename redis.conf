# Tandemn Orca — Redis configuration for production
#
# Usage:
#   redis-server /path/to/redis.conf
#
# Or with Docker:
#   docker run -d -p 6379:6379 -v $(pwd)/redis.conf:/usr/local/etc/redis/redis.conf redis:7 redis-server /usr/local/etc/redis/redis.conf

# ── Network ──
# Bind to all interfaces so workers on other VMs can connect.
bind 0.0.0.0

port 6379

# ── Authentication ──
# Set a strong password. Must match REDIS_PASSWORD in .env.
# Uncomment and replace with your actual password:
# requirepass your-strong-password-here

# ── Memory ──
# Limit memory usage. Chunk queue metadata is small (~1KB per chunk),
# so 256MB is plenty for thousands of concurrent jobs.
maxmemory 256mb
maxmemory-policy noeviction

# ── Persistence ──
# RDB snapshots: save state periodically in case of restart.
# For chunk queue, losing state means workers re-process some chunks
# (idempotent), so persistence is optional but nice to have.
save 900 1
save 300 10
save 60 10000

# ── Logging ──
loglevel notice
