name: mo-9d3422d4-1c12-4cdb-947b-60d3e0b0461e
num_nodes: 1
resources:
  infra: aws/us-east-1
  use_spot: true
  disk_size: 500GB
  instance_type: g6e.xlarge
file_mounts:
  /data:
    mode: MOUNT
    source: s3://tandemn-user-data
setup: 'export PYTHONHASHSEED=0

  set -euxo pipefail

  python3 -m pip install -U pip

  python3 -m pip install -U uv


  uv venv --python 3.12 --seed

  source .venv/bin/activate


  # Install vLLM

  uv pip install "datasets" "requests"

  uv pip install "vllm==0.10.0" # old vllm

  '
run: "set -euxo pipefail\nsource .venv/bin/activate\n\n~/sky_templates/ray/start_cluster\n\
  \nif [ \"$SKYPILOT_NODE_RANK\" == \"0\" ]; then\n    vllm run-batch -i /data/test.jsonl\
  \ -o /data/output.txt --model Qwen/Qwen3-0.6B \\\n    -tp 1 -pp 1 \\\n    \nfi"
