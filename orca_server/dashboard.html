<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orca Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --page:#f7f7f6;
  --surface:#ffffff;
  --surface-strong:#f1f1ef;
  --text:#2a2a28;
  --muted:#7a7a74;
  --line:#e6e4df;
  --accent:#355254;
  --accent-strong:#294446;
  --accent-deep:#233c3e;
  --accent-soft:#e4ebea;
  --accent-tint:#eff5f4;
  --accent-contrast:#f3f8f7;
  --radius-12:12px;
  --panel-frame-height:720px;
  --success:#111111;
  --warn:#444444;
  --danger:#111111;
  --sidebar:#f4f3f1;
  --sidebar-line:#e7e4de;
  --sidebar-text:#111111;
  --sidebar-muted:#7a7a7a;
  --sidebar-active:#111111;
}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-width:320px;
  min-height:100vh;
  color:var(--text);
  background:#f7f7f6;
  font-family:"Miranda Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button,input,textarea,select{font:inherit}
.app-shell{min-height:100vh}
.sidebar{display:none}
.job-picker{position:relative}
.job-picker-btn{display:inline-flex;align-items:center;justify-content:flex-start;gap:.45em;width:auto;padding:0;border:0;background:transparent;color:var(--sidebar-text);cursor:pointer;text-align:left;line-height:1}
.job-picker-copy{min-width:0}
.sidebar-title{font-size:1.05rem;font-weight:600;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-sub{margin-top:4px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--sidebar-muted)}
.job-picker-chevron{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;font-size:1em;line-height:1;color:var(--muted);flex-shrink:0;transform:translateY(.02em);transition:transform .16s ease, color .16s ease}
.job-picker-chevron::before{content:"⌄"}
.job-picker.open .job-picker-chevron{transform:translateY(.02em) rotate(180deg)}
.job-picker-menu{display:none;position:absolute;top:calc(100% + 14px);left:-14px;min-width:360px;padding:8px;background:rgba(255,255,255,.98);border:1px solid #d9d7d1;border-radius:var(--radius-12);box-shadow:0 14px 32px rgba(0,0,0,.08);z-index:20}
.job-picker.open .job-picker-menu{display:grid;gap:4px}
.job-option{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;padding:14px 16px;border:0;border-radius:var(--radius-12);background:transparent;color:var(--text);cursor:pointer;text-align:left;transition:background .16s ease, transform .16s ease}
.job-option:hover,.job-option:focus-visible{background:#f6f6f6;transform:translateX(2px);outline:none}
.job-option.active{background:#f1f1ef;color:#20201e}
.job-option-name{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-option-meta{font-size:.72rem;color:inherit;opacity:.72;flex-shrink:0}
.sidebar-nav{padding:14px 10px;display:grid;gap:2px;align-content:start}
.side-tab{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;color:#3d3d39;padding:10px 12px;border-radius:var(--radius-12);cursor:pointer;text-align:left;transition:background .16s ease,color .16s ease}
.side-tab:hover,.side-tab:focus-visible{background:#ecebe8;outline:none}
.side-tab.active{background:#e7e5e1;color:#222220}
.side-tab-kicker{display:none}
.main{min-width:0}
.topbar{padding:18px 22px 16px;border-bottom:1px solid var(--line);background:#f7f7f6;position:sticky;top:0;z-index:3}
.topbar-inner{max-width:1480px;margin:0 auto;display:flex;justify-content:flex-start;align-items:center;gap:16px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar-label{display:flex;align-items:center;gap:6px;padding:0;border:0;border-radius:0;background:transparent;color:#2a2a28;font-size:.98rem;font-weight:600;white-space:nowrap;line-height:1.1}
.topbar-sep{color:#989892;font-size:1.2rem;line-height:1}
.topbar-actions{display:none}
.top-nav-link{font-size:.84rem;color:#595954;font-weight:500}
.top-icon-btn{width:32px;height:32px;border:0;background:transparent;color:#4c4c47;border-radius:10px;display:grid;place-items:center;cursor:pointer}
.top-avatar{width:28px;height:28px;border-radius:999px;background:#deddd8;color:#3a3a36;display:grid;place-items:center;font-size:.78rem;font-weight:600}
.app{padding:28px}
.app-inner{max-width:1480px;margin:0 auto}
.content-stack{display:grid;gap:72px}
.app-header{margin-bottom:0;padding:32px;border:1px solid var(--line);border-radius:var(--radius-12);background:linear-gradient(180deg,#ffffff 0%,#f6f5f2 100%);box-shadow:0 18px 48px rgba(17,17,17,.05)}
.hero-title{font-size:clamp(2.6rem,6vw,3.4rem);line-height:1;letter-spacing:-.06em}
.hero-summary{margin-top:18px}
.hero-progress{margin-top:28px;max-width:520px}
.hero-progress-meta{display:grid;gap:12px}
.hero-progress-grid{display:grid;gap:12px}
.hero-progress-track{height:10px;width:100%;overflow:hidden;border-radius:999px;background:#ecebe8;margin-top:12px}
.hero-progress-fill{height:100%;border-radius:999px;background:#111111}
.hero-summary-grid{display:grid;gap:12px;margin-top:32px}
.hero-metrics{display:grid;gap:12px;margin-top:28px}
.hero-metric{padding:18px 20px;border:1px solid var(--line);border-radius:var(--radius-12);background:rgba(255,255,255,.72)}
.hero-metric-value{font-size:1.5rem;line-height:1;letter-spacing:-.04em}
.hero-metric-detail{margin-top:6px;font-size:.8rem;color:var(--muted)}
.inline-section{margin-top:0}
.inline-section-title{font-size:1rem;font-weight:600;letter-spacing:-.03em}
.inline-logs{display:grid;gap:12px}
.inline-log{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line)}
.inline-log:first-child{border-top:0;padding-top:0}
.inline-log:last-child{padding-bottom:0}
.inline-log-time{font-size:.74rem;color:var(--muted);white-space:nowrap}
.inline-log-message{font-size:.92rem;line-height:1.45;color:var(--text)}
.hero-subtitle{margin-top:8px;font-size:.95rem;color:var(--muted)}
.hero-meta{margin-top:10px;font-size:.9rem;color:var(--muted)}
.hero-refresh{margin-top:14px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.hero-refresh strong{color:var(--text);font-weight:500}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:32px}
.header-copy{min-width:0;flex:1}
.header-cta{display:none}
.conn{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted)}
.conn-dot{width:8px;height:8px;border-radius:999px;background:#9ca3af}
.conn-dot.connected{background:#111111}
.conn-dot.connecting{background:var(--warn);animation:pulse 1.1s infinite}
.conn-dot.disconnected{background:#9ca3af}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.section{display:grid;gap:24px}
.dashboard-section{display:grid;gap:24px;padding:28px;border:1px solid var(--line);border-radius:var(--radius-12);background:var(--surface);box-shadow:0 10px 28px rgba(17,17,17,.03)}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.section-kicker{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.section-title{margin-top:6px;font-size:1.5rem;font-weight:600;letter-spacing:-.04em}
.section-desc{max-width:760px;font-size:.92rem;line-height:1.6;color:var(--muted)}
.section-body{display:grid;gap:24px}
.overview-grid{grid-template-columns:1fr}
.metric-grid,.chart-grid,.chain-metrics,.overview-grid,.chain-grid{display:grid;gap:16px}
.metric-grid,.chain-metrics,.chart-grid{grid-template-columns:1fr}
.card{border:1px solid var(--line);border-radius:var(--radius-12);background:var(--surface);overflow:hidden;box-shadow:0 10px 28px rgba(17,17,17,.03)}
.card.accent{border-color:#dcdcdc;background:var(--surface-strong)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--line)}
.card.no-divider .card-header{border-bottom:0;padding-bottom:0}
.card-title{font-size:.875rem;font-weight:500}
.card-desc{margin-top:4px;font-size:.75rem;line-height:1.6;color:var(--muted)}
.card-body{padding:22px 20px}
.metric-value{font-size:2rem;line-height:1;letter-spacing:-.04em}
.metric-detail{margin-top:8px;font-size:.75rem;line-height:1.6;color:var(--muted)}
.summary-value{font-size:2.2rem;line-height:1;letter-spacing:-.05em}
.summary-grid{display:grid;gap:16px 24px;margin-top:20px}
.tiny-label,.chart-top,.chart-axis,.table-head,.log-time{text-transform:uppercase;letter-spacing:.08em;font-size:.6875rem;color:var(--muted)}
.summary-item-value,.info-value,.quota-count,.table-cell{font-size:.875rem}
.events,.logs{display:grid;gap:10px;font-size:13px;line-height:1.8}
.log-row{margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-level-info,.log-level-ok,.log-level-success,.log-level-warn,.log-level-error{color:var(--text)}
.quota-list,.info-list{display:grid}
.quota-row,.info-row{display:grid;gap:12px;padding:16px 0;border-top:1px solid var(--line)}
.quota-row:first-child,.info-row:first-child{border-top:0;padding-top:0}
.quota-row:last-child,.info-row:last-child{padding-bottom:0}
.quota-top,.quota-progress,.info-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.progress-track{height:8px;width:100%;overflow:hidden;border-radius:999px;background:#edf1f7}
.progress-bar{height:100%;border-radius:999px;background:var(--accent)}
.job-list{display:grid;gap:10px}
.job-btn{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-12);background:transparent;color:var(--text);cursor:pointer;text-align:left}
.job-btn.active{background:var(--accent-soft);border-color:#d6d6d6}
.job-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-block{display:grid;gap:14px}
.section-block + .section-block{border-top:1px solid var(--line);padding-top:20px}
.section-block-title{font-size:.875rem;font-weight:500}
.section-block-desc{font-size:.75rem;line-height:1.6;color:var(--muted)}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--muted)}
.chart-legend-item{display:inline-flex;align-items:center;gap:8px}
.chart-line{width:24px;height:0;border-top-width:2px;border-top-style:solid}
.chart-panel{padding:0}
.chart-panel-header{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:10px;margin-bottom:18px}
.chart-panel-title{font-size:1rem;font-weight:600;letter-spacing:-.03em}
.chart-wrap{position:relative;padding:6px 0 0;background-image:radial-gradient(rgba(17,17,17,.08) .8px, transparent .8px);background-size:18px 18px;background-position:0 16px;background-color:transparent}
.chart-svg{display:block;width:100%;height:100%}
.chart-svg path{transition:d .5s ease,opacity .3s ease}
.chart-svg circle{transition:cx .15s ease,cy .15s ease}
.chart-svg .hover-line{transition:x1 .15s ease,x2 .15s ease}
.chart-axis{position:absolute;top:50%;pointer-events:none}
.chart-axis.left{left:0;transform:translate(-24px,-50%) rotate(-90deg)}
.chart-axis.right{right:0;transform:translate(24px,-50%) rotate(90deg)}
.chart-top{position:absolute;top:8px;left:0;pointer-events:none}
.chart-footer{display:grid;gap:8px;margin-top:16px;min-height:54px;padding:0}
.tooltip-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.tooltip-rows{display:flex;flex-wrap:wrap;gap:14px}
.tooltip-row{display:flex;align-items:center;gap:8px}
.tooltip-key{display:inline-flex;align-items:center;gap:8px;color:var(--muted)}
.tooltip-dot{width:8px;height:8px;border-radius:999px}
.table-wrap{overflow-x:auto}
.data-table{width:100%;min-width:920px;border-collapse:separate;border-spacing:0}
.data-table th,.data-table td{padding:12px;text-align:left;border-bottom:1px solid var(--line)}
.data-table tbody tr:last-child td{border-bottom:0}
.phase-pill{display:inline-flex;align-items:center;gap:8px}
.phase-dot{width:8px;height:8px;border-radius:999px;background:#111111}
.empty{padding:48px 20px;text-align:center;color:var(--muted);border:1px solid var(--line);border-radius:var(--radius-12);background:var(--surface)}
@media (max-width: 980px){
  .job-picker-menu{min-width:280px}
}
@media (max-width: 700px){
  .topbar{padding:16px}
  .app{padding:20px 16px 32px}
  .app-header{padding:24px 20px}
  .dashboard-section{padding:22px 20px}
  .sidebar-nav{grid-template-columns:1fr}
  .topbar-actions{flex-wrap:wrap;justify-content:flex-end}
  .topbar-left{flex-wrap:wrap}
  .topbar-label{max-width:100%}
  .header-row{flex-direction:column}
  .section-head{align-items:flex-start;flex-direction:column}
}
@media (min-width:700px){
  .hero-progress-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .hero-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .hero-metrics{grid-template-columns:repeat(4,minmax(0,1fr))}
  .summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .quota-row{grid-template-columns:1.2fr .8fr;gap:16px}
  .chart-panel-header{flex-direction:row;align-items:center;gap:18px}
}
@media (min-width:768px){
  .metric-grid,.chain-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  .overview-grid{grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr)}
}
@media (min-width:1280px){
  .metric-grid,.chain-metrics{grid-template-columns:repeat(4,minmax(0,1fr))}
  .chain-grid{grid-template-columns:minmax(0,.7fr) minmax(0,1.3fr)}
}

.workspace{
  min-height:100vh;
  display:grid;
  gap:24px;
  padding:24px;
}
.app-header-bar{
  display:flex;
  align-items:center;
  gap:16px;
  width:100%;
  padding:18px 24px 16px;
  border:0;
  border-radius:0;
  background:#f7f7f6;
  position:sticky;
  top:0;
  z-index:10;
}
.header-job{
  min-width:260px;
}
.header-job-label,
.header-stat-label{
  font-size:.68rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
}
.header-job .job-picker-btn{
  padding:0;
  border:0;
  border-radius:0;
  background:transparent;
  color:var(--text);
  font-weight:700;
  font-size:1rem;
}
.header-job .job-picker-chevron{
  color:var(--muted);
}
.header-job .job-picker-menu{
  left:0;
  right:auto;
  top:calc(100% + 12px);
}
.header-run-meta{
  display:grid;
  gap:4px;
  justify-items:end;
  font-size:.82rem;
  color:var(--muted);
  text-align:right;
  white-space:nowrap;
  margin-left:auto;
}
.header-run-progress{
  font-size:1rem;
  font-weight:700;
  letter-spacing:-.03em;
  color:var(--text);
}
.header-run-updated{
  font-size:.76rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  display:flex;
  align-items:center;
  gap:6px;
  justify-content:flex-end;
}
.conn-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
  background:var(--muted);
  opacity:.5;
}
.conn-dot.connected{background:#4ade80;opacity:1}
.conn-dot.connecting{background:#facc15;opacity:1;animation:conn-pulse 1.2s ease-in-out infinite}
.conn-dot.disconnected{background:#f87171;opacity:1}
@keyframes conn-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.workspace-main{
  min-width:0;
  display:grid;
  gap:24px;
}
.dashboard-top{
  display:grid;
  gap:0;
}
.dashboard-job-row{
  display:flex;
  align-items:center;
  gap:16px;
}
.job-name-display{
  font-size:clamp(1.6rem,3.5vw,2.4rem);
  font-weight:700;
  letter-spacing:-.05em;
  line-height:1;
  color:var(--text);
}
.job-selector{
  position:relative;
  flex-shrink:0;
}
.job-selector-trigger{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--surface);
  color:var(--muted);
  font-size:.78rem;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
  transition:border-color .15s ease,color .15s ease,background .15s ease;
}
.job-selector-trigger:hover{
  border-color:#c8c6c0;
  color:var(--text);
  background:#f4f3f1;
}
.job-selector.open .job-selector-trigger{
  border-color:#c8c6c0;
  color:var(--text);
}
.job-selector-chevron{
  font-size:.7rem;
  line-height:1;
  transition:transform .16s ease;
  display:inline-block;
}
.job-selector.open .job-selector-chevron{
  transform:rotate(180deg);
}
.job-selector-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  min-width:300px;
  padding:6px;
  background:#fff;
  border:1px solid #d9d7d1;
  border-radius:var(--radius-12);
  box-shadow:0 12px 28px rgba(0,0,0,.09);
  z-index:20;
}
.job-selector.open .job-selector-menu{
  display:grid;
  gap:2px;
}
.job-selector-option{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  width:100%;
  padding:11px 14px;
  border:0;
  border-radius:10px;
  background:transparent;
  color:var(--text);
  font-size:.875rem;
  cursor:pointer;
  text-align:left;
  transition:background .12s ease;
}
.job-selector-option:hover{
  background:#f5f4f2;
}
.job-selector-option.active{
  background:#f0efed;
  font-weight:600;
}
.job-selector-option-left{
  display:flex;
  align-items:center;
  gap:9px;
  min-width:0;
}
.job-selector-option-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}
.job-selector-option-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.job-selector-option-meta{
  font-size:.72rem;
  color:var(--muted);
  white-space:nowrap;
  flex-shrink:0;
}
.replica-table-wrap{
  overflow-x:auto;
  border:1px solid var(--line);
  border-radius:var(--radius-12);
  background:#fbfbf9;
  box-shadow:0 14px 36px rgba(17,17,17,.04);
}
.replica-tbl{
  width:100%;
  border-collapse:collapse;
  font-size:.8125rem;
  white-space:nowrap;
}
.replica-tbl th{
  padding:10px 14px;
  text-align:left;
  font-size:.6875rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--muted);
  border-bottom:1px solid var(--line);
  font-weight:500;
}
.replica-tbl td{
  padding:11px 14px;
  border-bottom:1px solid var(--line);
  color:var(--text);
}
.replica-tbl tbody tr:last-child td{
  border-bottom:0;
}
.replica-row{
  cursor:pointer;
  transition:background .12s ease;
}
.replica-row:hover{
  background:#f6f5f3;
}
.replica-row.active{
  background:#111111;
  color:#ffffff;
}
.replica-row.active td{
  color:#ffffff;
}
.replica-phase-cell{
  display:flex;
  align-items:center;
  gap:7px;
}
.replica-phase-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}
.replica-table-empty{
  padding:48px 20px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.infra-empty{
  padding:4px 0;
}
.infra-empty-title{
  font-size:.94rem;
  font-weight:600;
  letter-spacing:-.02em;
  color:var(--text);
  opacity:.55;
}
.infra-empty-body{
  margin-top:6px;
  font-size:.82rem;
  line-height:1.55;
  color:var(--muted);
}
.dashboard-subtitle{
  margin-top:12px;
  max-width:720px;
  font-size:1.02rem;
  line-height:1.6;

function esc(value) {
  if (value == null) return "";
  const div = document.createElement("div");
  div.textContent = String(value);
  return div.innerHTML;
}

function fmtNumber(value) {
  if (value == null || Number.isNaN(value)) return "\u2014";
  return new Intl.NumberFormat("en-US").format(Math.round(value * 10) / 10);
}

function fmtCurrency(value) {
  if (value == null || Number.isNaN(value)) return "\u2014";
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }).format(value);
}

function fmtDuration(seconds) {
  if (seconds == null || seconds <= 0) return "\u2014";
  if (seconds < 60) return Math.round(seconds) + "s";
  if (seconds < 3600) {
    const m = Math.floor(seconds / 60);
    const s = Math.round(seconds % 60);
    return m + "m " + s + "s";
  }
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + "h " + m + "m";
}

function fmtProgress(progress) {
  return Math.round((progress || 0) * 100);
}

function fmtStatus(value) {
  if (!value) return "\u2014";
  const text = String(value).replace(/_/g, " ");
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function fmtLastRefreshed() {
  if (!state.lastRefreshed) return "—";
  return new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  }).format(new Date(state.lastRefreshed));
}

function fmtTimestamp(ts) {
  if (!ts) return "\u2014";
  return new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  }).format(new Date(ts * 1000));
}

function gpuName(instanceType) {

}

function phaseColor(phase) {
  const map = {
    running:"#4ade80",generating:"#4ade80",succeeded:"#4ade80",completed:"#4ade80",
    model_ready:"#60a5fa",loading_model:"#60a5fa",provisioned:"#60a5fa",
    launching:"#facc15",
    failed:"#f87171",dead:"#f87171",killed:"#f87171"
  };
  return map[phase] || "#9ca3af";
}

function getJobs(data) {
  return (data.jobs || []).slice().sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
}

function getActiveJob(data) {
  const jobs = getJobs(data);
  if (!jobs.length) return null;
  const selected = jobs.find((job) => job.job_id === state.activeJobId) || jobs[0];
  state.activeJobId = selected.job_id;
  return selected;
}

function getReplicas(data, job) {
  if (!job) return [];
  return (data.replicas && data.replicas[job.job_id]) || [];
}

function getLiveReplicas(data, job) {
  const dead = new Set(["failed", "dead", "killed", "swapped_out"]);
  return getReplicas(data, job).filter((replica) => !dead.has(replica.phase));
}

function getQuotaRows(data) {
  return (data.quota || []).filter((item) => (item.Baseline || 0) > 0);
}

function getEvents(data) {
  return (data.events || []).slice().sort((a, b) => (a.ts || 0) - (b.ts || 0));
}

function chartPoint(index, pointCount, value, maxY) {
  const usableWidth = chartWidth - chartPadding.left - chartPadding.right;
  const usableHeight = chartHeight - chartPadding.top - chartPadding.bottom;
  return {
    x: chartPadding.left + (index / Math.max(pointCount - 1, 1)) * usableWidth,
    y: chartHeight - chartPadding.bottom - (Math.max(value, 0) / Math.max(maxY, 1)) * usableHeight
  };
}

function buildLinePath(values, maxY) {
  if (values.length < 2) {
    var p = chartPoint(0, values.length, values[0] || 0, maxY);
    return "M " + p.x.toFixed(2) + " " + p.y.toFixed(2);
  }
  var pts = values.map(function(v, i) { return chartPoint(i, values.length, v, maxY); });
  var d = "M " + pts[0].x.toFixed(2) + " " + pts[0].y.toFixed(2);
  for (var i = 0; i < pts.length - 1; i++) {
    var p0 = pts[Math.max(i - 1, 0)];
    var p1 = pts[i];
    var p2 = pts[i + 1];
    var p3 = pts[Math.min(i + 2, pts.length - 1)];
    var cp1x = p1.x + (p2.x - p0.x) / 6;
    var cp1y = p1.y + (p2.y - p0.y) / 6;
    var cp2x = p2.x - (p3.x - p1.x) / 6;
    var cp2y = p2.y - (p3.y - p1.y) / 6;
    d += " C " + cp1x.toFixed(2) + " " + cp1y.toFixed(2) + ", " + cp2x.toFixed(2) + " " + cp2y.toFixed(2) + ", " + p2.x.toFixed(2) + " " + p2.y.toFixed(2);
  }
  return d;
}

function buildAreaPath(values, maxY) {
  const line = buildLinePath(values, maxY);
  const baseY = chartHeight - chartPadding.bottom;
  const usableWidth = chartWidth - chartPadding.left - chartPadding.right;
  const lastX = chartPadding.left + usableWidth;
  return line + " L " + lastX.toFixed(2) + " " + baseY.toFixed(2) + " L " + chartPadding.left + " " + baseY.toFixed(2) + " Z";
}

function buildPartialLinePath(values, maxY, endIndex) {
  if (!values.length) return "";
  var end = Math.max(1, endIndex + 1);
  var pts = values.slice(0, end).map(function(v, i) { return chartPoint(i, values.length, v, maxY); });
  if (pts.length < 2) return "M " + pts[0].x.toFixed(2) + " " + pts[0].y.toFixed(2);
  var d = "M " + pts[0].x.toFixed(2) + " " + pts[0].y.toFixed(2);
  for (var i = 0; i < pts.length - 1; i++) {
    var p0 = pts[Math.max(i - 1, 0)];
    var p1 = pts[i];
    var p2 = pts[i + 1];
    var p3 = pts[Math.min(i + 2, pts.length - 1)];
    var cp1x = p1.x + (p2.x - p0.x) / 6;
    var cp1y = p1.y + (p2.y - p0.y) / 6;
    var cp2x = p2.x - (p3.x - p1.x) / 6;
    var cp2y = p2.y - (p3.y - p1.y) / 6;
    d += " C " + cp1x.toFixed(2) + " " + cp1y.toFixed(2) + ", " + cp2x.toFixed(2) + " " + cp2y.toFixed(2) + ", " + p2.x.toFixed(2) + " " + p2.y.toFixed(2);
  }
  return d;
}

function normalizeTimeseries(data, job) {
  if (!job) return [];
  const server = (data.timeseries && data.timeseries[job.job_id]) || [];
  if (server.length && (!state.timeseries[job.job_id] || state.timeseries[job.job_id].length < server.length)) {
    state.timeseries[job.job_id] = server.slice(-MAX_TS);
  }
  const metrics = (data.metrics && data.metrics[job.job_id]) || {};
  if (ACTIVE_PHASES.has(job.status) && Object.keys(metrics).length) {
    if (!state.timeseries[job.job_id]) state.timeseries[job.job_id] = [];
    const last = state.timeseries[job.job_id][state.timeseries[job.job_id].length - 1];
    const nextTs = Date.now() / 1000;
    if (!last || nextTs - last.timestamp >= 1.5) {
      state.timeseries[job.job_id].push(Object.assign({ timestamp: nextTs }, metrics));
      state.timeseries[job.job_id] = state.timeseries[job.job_id].slice(-MAX_TS);
    }
  }
  const activeIds = new Set(getJobs(data).map((item) => item.job_id));
  Object.keys(state.timeseries).forEach((jobId) => {
    if (!activeIds.has(jobId)) delete state.timeseries[jobId];
  });
  return state.timeseries[job.job_id] || [];
}

      topTick: fmtNumber(Math.max(500, ...series.map((point) => Math.max(point.num_requests_running || 0, point.num_requests_waiting || 0, point.num_requests_swapped || 0)))),
      maxY: Math.max(500, ...series.map((point) => Math.max(point.num_requests_running || 0, point.num_requests_waiting || 0, point.num_requests_swapped || 0))),
      series: [

function renderDonut(used, total) {
  const r = 20, c = 28;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? Math.min(used / total, 1) : 0;
  const filled = pct * circ;
  const trackColor = "#ebebea";
  const fillColor = "#111111";
  return '<svg width="56" height="56" viewBox="0 0 56 56">'
    + '<circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="none" stroke="' + trackColor + '" stroke-width="9"></circle>'
    + (pct > 0 ? '<circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="none" stroke="' + fillColor + '" stroke-width="9"'
      + ' stroke-dasharray="' + filled.toFixed(2) + ' ' + (circ - filled).toFixed(2) + '"'
      + ' stroke-linecap="round" transform="rotate(-90 ' + c + ' ' + c + ')"></circle>' : '')
    + '</svg>';
}

function installChartInteractions() {
  document.querySelectorAll("[data-chart]").forEach((node) => {
    const definition = JSON.parse(node.getAttribute("data-chart"));
    const hit = node.querySelector(".hover-hit");
    const line = node.querySelector(".hover-line");
    const activeSeries = node.querySelector(".hover-series");
    const points = node.querySelector(".hover-points");
    const footer = node.parentElement.querySelector(".chart-footer");
    const tooltipTitle = footer.querySelector(".tooltip-title");
    const tooltipRows = footer.querySelector(".tooltip-rows");
    const count = Math.max.apply(null, definition.series.map((item) => item.values.length));
    // Pre-create persistent path + circle elements so CSS transitions work
    var seriesPaths = definition.series.map((item) => {
      var p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("fill", "none");
      p.setAttribute("stroke", item.color);
      p.setAttribute("stroke-width", "1.2");
      p.setAttribute("stroke-linecap", "round");
      p.setAttribute("stroke-linejoin", "round");
      if (item.dashed) p.setAttribute("stroke-dasharray", "5 4");
      activeSeries.appendChild(p);
      return p;
    });
    var seriesDots = definition.series.map((item) => {
      var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("r", "2.5");
      c.setAttribute("fill", item.color);
      c.setAttribute("stroke", "#050607");
      c.setAttribute("stroke-width", "1");
      points.appendChild(c);
      return c;
    });
    function showIndex(index) {
      var anchor = chartPoint(index, count, definition.maxY * 0.5, definition.maxY);
      line.setAttribute("x1", anchor.x);
      line.setAttribute("x2", anchor.x);
      line.style.display = "";
      definition.series.forEach(function(item, i) {
        seriesPaths[i].setAttribute("d", buildPartialLinePath(item.values, definition.maxY, index));
        var value = item.values[Math.min(index, item.values.length - 1)] || 0;
        var pt = chartPoint(index, count, value, definition.maxY);
        seriesDots[i].setAttribute("cx", pt.x);
        seriesDots[i].setAttribute("cy", pt.y);
      });
      tooltipTitle.textContent = "Sample " + String(index + 1).padStart(2, "0");
      tooltipRows.innerHTML = definition.series.map((item) => {
        const values = item.tooltipValues || item.values;
        const currentValue = values[Math.min(index, values.length - 1)] || 0;
        return '<div class="tooltip-row"><span class="tooltip-key"><span class="tooltip-dot" style="background:' + item.color + '"></span>' + esc(item.label) + '</span><span>' + esc(fmtNumber(currentValue) + (item.valueSuffix || "")) + '</span></div>';
      }).join("");
    }
    function showLastPoint() { showIndex(count - 1); }
    hit.addEventListener("mouseleave", showLastPoint);
    hit.addEventListener("mousemove", function (event) {
      const rect = hit.getBoundingClientRect();
      const relativeX = (event.clientX - rect.left) / rect.width;
      showIndex(Math.min(count - 1, Math.max(0, Math.round(relativeX * Math.max(count - 1, 0)))));
    });
    showLastPoint();
  });
}

function render() {
  if (state.view === "projects") {
    document.getElementById("app").innerHTML = renderProjectsPage();
    document.querySelectorAll("[data-project]").forEach(function(row) {
      row.onclick = function () {
        state.view = "dashboard";
        render();
      };
    });
    return;
  }
  const data = state.lastData || {};
  const jobs = getJobs(data);
  const job = getActiveJob(data);
  const metrics = job && data.metrics ? (data.metrics[job.job_id] || {}) : {};
  const chunks = job && data.chunks ? (data.chunks[job.job_id] || null) : null;
  const replicas = getLiveReplicas(data, job);
  if (!state.activeReplicaId && replicas.length) {
    state.activeReplicaId = replicas[0].replica_id;
  }
  const cost = job && data.cost ? (data.cost[job.job_id] || null) : null;
  const quotaRows = getQuotaRows(data);
  const events = getEvents(data);
  const workload = pickWorkload(job, chunks);
  const chain = pickChain(job, replicas, cost);
  const metricsSummary = pickMetricsSummary(job, metrics, cost, replicas);
  const series = normalizeTimeseries(data, job);
  document.getElementById("app").innerHTML = '<div class="app-shell"><div class="workspace">'
    + renderStickyHeader(job, jobs, chain || { replicas: 0, eta_label: "\u2014" }, metricsSummary || {})
    + renderBentoDashboard(job, jobs, workload, chain || { progress_pct: 0, replicas: 0, eta_label: "\u2014", replicas_detail: [] }, metricsSummary || { throughput_avg_window_s: 10 }, events, series, quotaRows)
    + '</div></div>';
  var backBtn = document.getElementById("back-to-projects");
  if (backBtn) {
    backBtn.onclick = function () {
      state.view = "projects";
      render();
    };
  }
  const selectorBtn = document.getElementById("job-selector-btn");
  if (selectorBtn) {
    selectorBtn.onclick = function (e) {
      e.stopPropagation();
      state.jobPickerOpen = !state.jobPickerOpen;
      render();
    };
  }
  document.addEventListener("click", function closeSelector(e) {
    if (state.jobPickerOpen && e.target && typeof e.target.closest === "function" && !e.target.closest("#job-selector")) {
      state.jobPickerOpen = false;
      render();
      document.removeEventListener("click", closeSelector);
    }
  });
  document.querySelectorAll("[data-job]").forEach((button) => {
    button.onclick = function (e) {
      e.stopPropagation();
      const newId = this.getAttribute("data-job");
      if (newId !== state.activeJobId) state.activeReplicaId = null;
      state.activeJobId = newId;
      state.jobPickerOpen = false;
      render();
    };
  });
  document.querySelectorAll("[data-replica]").forEach((el) => {
    el.onclick = function () {
      state.activeReplicaId = this.getAttribute("data-replica") || null;
      render();
    };
  });
  document.querySelectorAll("[data-chart-filter]").forEach((button) => {
    button.onclick = function () {
      state.activeChartKey = this.getAttribute("data-chart-filter") || "throughput";
      render();
    };
  });
  installChartInteractions();
}

function setConnection(next) {
  state.connection = next;
  render();
}

function pollOnce() {
  if (mockConfig) return;
  fetch(window.location.origin + "/dashboard/poll").then((response) => response.json()).then((payload) => {
    state.lastData = payload;
    state.lastRefreshed = Date.now();
    setConnection("connected");
  }).catch(function () {
    setConnection("disconnected");
  });
}

function startPolling() {
  if (mockConfig) return;
  if (state.pollTimer) return;
  pollOnce();
  state.pollTimer = setInterval(pollOnce, 2000);
}

function connect() {
  if (mockConfig) {
    const frames = Array.isArray(mockConfig.frames) && mockConfig.frames.length ? mockConfig.frames : [mockConfig.payload || {}];
    let index = 0;
    state.lastData = frames[0] || {};
    setConnection("connected");
    if (frames.length > 1) {
      state.pollTimer = setInterval(function () {
        index = (index + 1) % frames.length;
        state.lastData = frames[index];
        render();
      }, mockConfig.interval_ms || 2000);
    }
    return;
  }
  if (state.eventSource) {
    try { state.eventSource.close(); } catch (_err) {}
  }
  setConnection("connecting");
  let gotData = false;
  const source = new EventSource(window.location.origin + "/dashboard/stream");
  state.eventSource = source;
  const timeout = setTimeout(function () {
    if (!gotData) {
      try { source.close(); } catch (_err) {}
      startPolling();
    }
  }, 5000);
  source.onopen = function () {
    setConnection("connected");
  };
  source.onmessage = function (event) {
    gotData = true;
    clearTimeout(timeout);
    try {
      state.lastData = JSON.parse(event.data);
      state.lastRefreshed = Date.now();
      state.connection = "connected";
      render();
    } catch (_err) {}
  };
  source.onerror = function () {
    clearTimeout(timeout);
    setConnection("disconnected");
    try { source.close(); } catch (_err) {}
    state.eventSource = null;
    if (!gotData) {
      startPolling();
      return;
    }
    if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
    state.reconnectTimer = setTimeout(connect, 3000);
  };
}

render();
connect();
})();
</script>
