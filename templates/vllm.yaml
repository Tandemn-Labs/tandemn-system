name: default-cluster

num_nodes: 1

resources:
  infra: aws
  disk_size: 300GB
  instance_type: p3.gxlarge
  ports: 8001 # Expose port for observability

envs:
  HF_TOKEN: null  # Will be replaced at runtime
  # vLLM/transformers pin — set by orca_server.config (DEFAULT_VLLM_VERSION /
  # DEFAULT_TRANSFORMERS_VERSION). Default 0.19.1 + 4.57.6; override via
  # ORCA_VLLM_VERSION / ORCA_TRANSFORMERS_VERSION env on the control plane.
  VLLM_VERSION: "0.19.1"
  TRANSFORMERS_VERSION: "4.57.6"
  VLLM_USE_V1: "1"
  VLLM_NO_USAGE_STATS: "1"
  VLLM_LOG_STATS_INTERVAL: "1"  # 1-second Prometheus counter flush for live throughput
  # CUDA initialization settings for A100/multi-GPU stability
  CUDA_DEVICE_ORDER: "PCI_BUS_ID"  # Consistent GPU ordering
  NCCL_ASYNC_ERROR_HANDLING: "1"  # Better error handling for multi-GPU
  CUDA_LAUNCH_BLOCKING: "0"  # Keep async (1 for debugging only)

file_mounts:
  ~/batch_runner.py: ./templates/vllm_batch_runner_server.py
  ~/vllm_compat_patch.py: ./templates/vllm_compat_patch.py

setup: |
  export PYTHONHASHSEED=0
  set -euxo pipefail
  python3 -m pip install -U pip
  python3 -m pip install -U uv

  uv venv --python 3.12 --seed
  source .venv/bin/activate

  # Pre-install Ray to work around SkyPilot bug (ray[default]==added parse error)
  uv pip install "ray[default]>=2.48.0"

  # ========================================================================
  # Install vLLM $VLLM_VERSION
  # ========================================================================
  # Versions set via envs (VLLM_VERSION, TRANSFORMERS_VERSION). vLLM 0.19.1
  # requires CUDA 13.0 / driver 580+, which is only on the DLAMI selected
  # via launcher.py (image_id resolved from orca_server.config.GPU_AMI_MAP).
  # The default SkyPilot AMI ships driver 535 / CUDA 12.2 → 0.19.1 fails.
  # ========================================================================
  echo "=== Installing vLLM $VLLM_VERSION ==="
  uv pip install "transformers==$TRANSFORMERS_VERSION"  # transformers > 5.0.0 breaks vLLM
  uv pip install "vllm==$VLLM_VERSION" aiohttp pynvml

  # Verify PyTorch CUDA
  python3 -c "import torch; print('PyTorch:', torch.__version__, 'CUDA:', torch.version.cuda, 'Available:', torch.cuda.is_available())"

  SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")

  # ========================================================================
  # Apply patches for vLLM 0.10.0 + transformers 5.x
  # ========================================================================

  # Patch 1: Fix DisabledTqdm bug (duplicate 'disable' kwarg)
  WEIGHT_UTILS="$SITE_PACKAGES/vllm/model_executor/model_loader/weight_utils.py"
  sed -i 's/super().__init__(\*args, \*\*kwargs, disable=True)/kwargs.pop("disable", None); super().__init__(*args, **kwargs, disable=True)/' "$WEIGHT_UTILS"
  echo "Patched vLLM DisabledTqdm"

  # Patch 2: Install compatibility patch for all_special_tokens_extended
  # vLLM uses all_special_tokens_extended which was removed in transformers 4.47+
  cp ~/vllm_compat_patch.py "$SITE_PACKAGES/vllm_compat_patch.py"
  echo "import vllm_compat_patch" > "$SITE_PACKAGES/sitecustomize.py"
  echo "Installed vLLM compatibility patch for transformers 5.x"

  # Verify vLLM works
  python3 -c "from vllm import LLM; print('vLLM import successful')"

  # ========================================================================
  # NVSwitch/NVLink: Fabric Manager for A100/H100 instances
  # On DLAMI (auto-selected by network_tier=best), driver is pre-installed
  # but Fabric Manager may need to be installed/started.
  # ========================================================================
  GPU_NAME=$(nvidia-smi --id=0 --query-gpu=name --format=csv,noheader 2>/dev/null || echo "unknown")
  IS_NVSWITCH=false
  if echo "$GPU_NAME" | grep -qiE "A100|H100|H200"; then
    IS_NVSWITCH=true
  fi

  if [ "$IS_NVSWITCH" = "true" ]; then
    echo "=== NVSwitch Instance Detected: $GPU_NAME ==="
    if systemctl is-active --quiet nvidia-fabricmanager 2>/dev/null; then
      echo "[NVSwitch] Fabric Manager: active"
    else
      DRIVER_VERSION_FULL=$(nvidia-smi --id=0 --query-gpu=driver_version --format=csv,noheader)
      DRIVER_VERSION_MAJOR=$(echo "$DRIVER_VERSION_FULL" | cut -d. -f1)
      echo "[NVSwitch] Driver: $DRIVER_VERSION_FULL, installing Fabric Manager..."
      sudo apt-get update -qq
      sudo apt-get install -y "nvidia-fabricmanager-${DRIVER_VERSION_MAJOR}=${DRIVER_VERSION_FULL}-1" 2>/dev/null \
        || sudo apt-get install -y "nvidia-fabricmanager-${DRIVER_VERSION_MAJOR}" 2>/dev/null
      sudo systemctl enable --now nvidia-fabricmanager
      sleep 3
      if systemctl is-active --quiet nvidia-fabricmanager; then
        echo "[NVSwitch] Fabric Manager: OK"
      else
        echo "[NVSwitch] FATAL: Fabric Manager failed to start."
        systemctl status nvidia-fabricmanager --no-pager || true
        exit 1
      fi
    fi
    nvidia-smi topo -m 2>&1 | awk 'NR<=15' || true
  else
    echo "=== Non-NVSwitch instance ($GPU_NAME) — skipping Fabric Manager ==="
  fi

run: |
  set -euxo pipefail
  source .venv/bin/activate

  # Manual Ray cluster setup (bypasses broken SkyPilot start_cluster script)
  RAY_PORT=6379
  if [ "$SKYPILOT_NODE_RANK" == "0" ]; then
    echo "Starting Ray head node..."
    ray start --head --port=$RAY_PORT --dashboard-host=0.0.0.0 --disable-usage-stats
  else
    echo "Starting Ray worker node..."
    HEAD_IP=$(echo "$SKYPILOT_NODE_IPS" | head -n1)
    for i in {1..60}; do
      if ray start --address="$HEAD_IP:$RAY_PORT" --disable-usage-stats 2>/dev/null; then
        echo "Connected to Ray head"
        break
      fi
      sleep 2
    done
  fi
  ray status

  if [ "$SKYPILOT_NODE_RANK" == "0" ]; then
    echo "Ready for batch job"
  fi
